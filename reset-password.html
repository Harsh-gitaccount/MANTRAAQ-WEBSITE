<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Mantraaq</title>
  <!-- Outfit Font (Matches main site) -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --bg: #f8fafc;
      --text: #0f172a;
      --border: #e2e8f0;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: min(100vh, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 440px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      text-align: center;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #34d399, var(--primary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      font-size: 20px;
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    p.subtitle {
      font-size: 14px;
      color: #64748b;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: left;
    }

    .form-grp {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-grp label {
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-grp input {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
      background: #f8fafc;
      width: 100%;
    }

    .form-grp input:focus {
      border-color: var(--primary);
      background: #ffffff;
    }

    .submit-btn {
      background: linear-gradient(90deg, var(--primary), var(--primary-dark));
      border: none;
      color: #ffffff;
      padding: 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
      transition: all 0.3s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .submit-btn:hover {
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .back-home {
      display: inline-block;
      margin-top: 24px;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }

    .back-home:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    .error-card {
      display: none;
      padding: 16px;
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 24px;
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="logo-icon">M</div>
      <span class="logo-text">MantraAQ</span>
    </div>

    <div id="errorCard" class="error-card"></div>

    <div id="formContainer">
      <h1>Choose New Password</h1>
      <p class="subtitle">Enter a secure new password for your account below.</p>

      <form id="resetForm" onsubmit="handleResetSubmit(event)">
        <div class="form-grp">
          <label>New Password (Min 6 Characters)</label>
          <input type="password" id="newPassword" placeholder="••••••••" minlength="6" required />
        </div>
        <div class="form-grp">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required />
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
      </form>
    </div>

    <a href="index.html" class="back-home">&larr; Return to Storefront</a>
  </div>

  <!-- Load dependencies (api.js & toast.js) -->
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script>
    let token = null;

    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      token = params.get('token');

      if (!token) {
        showError('Invalid reset link. The security token is missing.');
        document.getElementById('formContainer').style.display = 'none';
      }
    });

    function showError(msg) {
      const card = document.getElementById('errorCard');
      card.textContent = msg;
      card.style.display = 'block';
    }

    async function handleResetSubmit(e) {
      e.preventDefault();
      
      const password = document.getElementById('newPassword').value;
      const confirmPass = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      if (password !== confirmPass) {
        window.Toast.error('Passwords do not match.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      try {
        const data = await window.MantraaqAPI.resetPassword({ token, password });
        if (data && data.success) {
          window.Toast.success('Password reset successfully! Redirecting to home page...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 3000);
        } else {
          window.Toast.error(data.message || 'Failed to reset password.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch (err) {
        console.error('Reset password submit error:', err);
        window.Toast.error(err.message || 'The reset token may have expired or is invalid.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
